<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Outfit', sans-serif; background: #f4f5f4; }
        .ust-serit { padding: 25px 60px; display: flex; justify-content: space-between; align-items: center; background: #fff; border-bottom: 1px solid #e8e8e8; }
        .baslik-kapsayici { display: flex; align-items: center; gap: 15px; }
        .ana-logo { height: 35px; }
        h1 { font-size: 0.95rem; letter-spacing: 3px; color: #1a1a1a; font-weight: 700; margin: 0; }
        
        .menu-ve-arama { display: flex; align-items: center; gap: 60px; }
        .menu-linkleri a { text-decoration: none; color: #555; font-size: 0.85rem; font-weight: 500; }
        
        /* Kartlar */
        #ana-ekran { display: flex; justify-content: center; gap: 50px; margin-top: 80px; flex-wrap: wrap; }
        .kategori-kart { position: relative; width: 280px; cursor: pointer; transition: 0.3s; }
        .kategori-foto { width: 100%; height: 380px; background: #ddd; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .kategori-foto img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .kategori-kart:hover img { transform: scale(1.1); }
        .kategori-yazi { margin-top: 20px; text-align: center; font-weight: 600; color: #333; }
    </style>
</head>
<body>

    <header class="ust-serit">
        <div class="baslik-kapsayici">
            <img src="logo.png" class="ana-logo">
            <h1>TÜRKİYE HERPETOLOJİ REHBERİ</h1>
        </div>
        <div class="menu-ve-arama">
            <nav class="menu-linkleri"><a href="iletisim.html">İLETİŞİM</a></nav>
        </div>
    </header>

    <div id="ana-ekran">
        <div class="kategori-kart" onclick="window.location.href='zehirli.html'">
            <div class="kategori-foto"><img src="zehirli-icon.jpg"></div>
            <div class="kategori-yazi">ZEHİRLİLER</div>
        </div>
        <div class="kategori-kart" onclick="window.location.href='yari-zehirli.html'">
            <div class="kategori-foto"><img src="yari-zehirli-icon.png"></div>
            <div class="kategori-yazi">YARI ZEHİRLİ</div>
        </div>
        <div class="kategori-kart" onclick="window.location.href='zehirsiz.html'">
            <div class="kategori-foto"><img src="zehirsiz-icon.jpg"></div>
            <div class="kategori-yazi">ZEHİRSİZLER</div>
        </div>
    </div>

    <script>
        function filtrele() {
            let input = document.getElementById('yilanArama').value.toLowerCase();
            let kartlar = document.getElementsByClassName('kategori-kart');
            
            for (let i = 0; i < kartlar.length; i++) {
                let isim = kartlar[i].querySelector('.kategori-yazi').innerText.toLowerCase();
                if (isim.includes(input)) {
                    kartlar[i].style.display = ""; 
                } else {
                    kartlar[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
