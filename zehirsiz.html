<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Outfit', sans-serif; background: #f4f5f4; }
        .ust-serit { padding: 25px 60px; display: flex; justify-content: space-between; align-items: center; background: #fff; border-bottom: 1px solid #e8e8e8; }
        .baslik-kapsayici { display: flex; align-items: center; gap: 15px; }
        .ana-logo { height: 35px; }
        h1 { font-size: 0.95rem; letter-spacing: 3px; color: #1a1a1a; font-weight: 700; margin: 0; }
        
        /* Genişlik ve padding ayarları diğer sayfalarla aynı yapıldı */
        .icerik-container { max-width: 900px; margin: 60px auto; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .icerik-container h1 { font-size: 1.8rem; margin-bottom: 20px; color: #111; }
        
        .kategori-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .kat-btn { 
            padding: 40px; background: #f9f9f9; border-radius: 15px; text-align: center; 
            text-decoration: none; color: #333; font-weight: 700; border: 2px solid #eee; 
            transition: 0.3s; 
        }
        .kat-btn:hover { border-color: #3b82f6; background: #eff6ff; transform: translateY(-5px); }
        
        .geri-don { display: block; margin-top: 40px; color: #555; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <header class="ust-serit">
        <div class="baslik-kapsayici">
            <img src="logo.png" class="ana-logo">
            <h1>TÜRKİYE HERPETOLOJİ REHBERİ</h1>
        </div>
    </header>

    <div class="icerik-container">
        <h1>ZEHİRSİZ YILANLAR</h1>
        <p>Zehirsiz türleri daha kolay keşfedebilmen için onları grupladık. İlgili grubu seçerek rehberine devam edebilirsin:</p>
        
        <div class="kategori-grid">
            <a href="su-yilanlari.html" class="kat-btn">SU YILANLARI</a>
            <a href="tarla-yilanlari.html" class="kat-btn">TARLA VE BAHÇE YILANLARI</a>
            <a href="diger-yilanlar.html" class="kat-btn">KÖR VE DİĞER TÜRLER</a>
        </div>

        <a href="index.html.html" class="geri-don">⬅ ANA SAYFAYA DÖN</a>
    </div>

</body>
</html>
