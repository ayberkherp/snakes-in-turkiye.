<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gözlem Haritası | Türkiye Herpetoloji Rehberi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; font-family: 'Outfit', sans-serif; background: #f4f5f4; }
        
        /* Navbar */
        .ust-serit { padding: 20px 60px; display: flex; justify-content: space-between; align-items: center; background: #fff; border-bottom: 1px solid #e8e8e8; }
        .baslik-kapsayici { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .ana-logo { height: 35px; }
        h1 { font-size: 0.95rem; letter-spacing: 3px; color: #1a1a1a; font-weight: 700; margin: 0; }
        .iletisim-link { text-decoration: none; color: #555; font-size: 0.85rem; font-weight: 500; }

        /* Ana İçerik */
        .ana-kapsayici { padding: 40px 60px; }
        #map { height: 500px; width: 100%; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); margin-bottom: 40px; }
        
        /* Modern Form Bölümü */
        .form-section { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .form-section h2 { margin-top: 0; color: #1a1a1a; }
        .gozlem-butonu { background-color: #1c5234; color: #fff !important; padding: 14px 35px; border-radius: 8px; font-weight: 700; text-decoration: none; display: inline-block; margin-top: 20px; transition: 0.3s; }
        .gozlem-butonu:hover { background-color: #143d26; }
        
        /* Popup Tasarımı (Dokunulmadı) */
        .popup-card { width: 180px; text-align: center; }
        .popup-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 5px; margin-bottom: 8px; }
        .popup-card a { color: #1c5234; font-weight: bold; text-decoration: none; font-size: 0.9rem; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <header class="ust-serit">
        <div class="baslik-kapsayici" onclick="window.location.href='index.html'">
            <img src="logo.png" class="ana-logo">
            <h1>TÜRKİYE HERPETOLOJİ REHBERİ</h1>
        </div>
        <a href="iletisim.html" class="iletisim-link">İLETİŞİM</a>
    </header>

    <div class="ana-kapsayici">
        <div id="map"></div>

        <section class="form-section">
            <h2>Yeni Gözlem Bildir</h2>
            <p>Yeni bir tür mü tespit ettiniz? Gözlemlerinizi bizimle paylaşın.</p>
            <a href="https://forms.gle/CXKPEdaGZCwA25eC9" target="_blank" class="gozlem-butonu">GÖZLEM FORMU'NU AÇ</a>
        </section>
    </div>

    <script>
        var map = L.map('map').setView([36.97, 28.69], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        var popupIcerik = `
            <div class="popup-card">
                <img src="seritli.jpg">
                <b>Şeritli Engerek</b><br>
                <i style="font-size: 0.8rem;">Vipera xanthina</i><br>
                <a href="detay.html">Detayları Gör</a>
            </div>
        `;
        
        L.marker([36.97, 28.69]).addTo(map).bindPopup(popupIcerik);
    </script>
</body>
</html>
